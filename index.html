<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monoid Tiles</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #1a1a2e;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        font-family: "Courier New", monospace;
        color: #e0e0e0;
      }
      canvas {
        border: 2px solid #444;
        image-rendering: pixelated;
      }
      #ui {
        margin-top: 12px;
        text-align: center;
        font-size: 14px;
        color: #888;
      }
      #message {
        margin-top: 8px;
        font-size: 18px;
        color: #4ecdc4;
        min-height: 24px;
      }
    </style>
  </head>
  <body>
    <canvas id="game"></canvas>
    <div id="ui">
      WASD / Arrow Keys: Move &nbsp; Space: Jump (release all)<br>
      <span id="message"></span>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
