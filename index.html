<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monoid Tiles</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #3a3a5c;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: "Courier New", monospace;
        color: #e0e0e0;
      }
      canvas {
        border: 2px solid #444;
        image-rendering: pixelated;
      }
      #ui {
        margin-top: 12px;
        text-align: center;
        font-size: 14px;
        color: #888;
      }
      #message {
        margin-top: 8px;
        font-size: 18px;
        color: #4ecdc4;
        min-height: 24px;
      }
      #next-stage {
        visibility: hidden;
        margin-top: 8px;
        padding: 8px 24px;
        background: #4ecdc4;
        color: #1a1a2e;
        border: none;
        font-family: "Courier New", monospace;
        font-size: 16px;
        font-weight: bold;
        cursor: pointer;
      }
      #next-stage:hover {
        background: #3dbdb5;
      }
      #stage-select {
        display: none;
        flex-wrap: wrap;
        gap: 16px;
        justify-content: center;
        max-width: 700px;
        padding: 16px;
      }
      #stage-select-title {
        width: 100%;
        text-align: center;
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 4px;
      }
      .stage-card {
        cursor: pointer;
        text-align: center;
      }
      .stage-card canvas {
        border: 2px solid #555;
        display: block;
      }
      .stage-card:hover canvas {
        border-color: #4ecdc4;
      }
      .stage-card-name {
        font-size: 11px;
        color: #ccc;
        margin-bottom: 4px;
      }
      #game-container {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div id="stage-select">
      <div id="stage-select-title">Stage Select</div>
    </div>
    <div id="game-container">
      <canvas id="game"></canvas>
      <div id="ui">
        WASD / Arrow Keys: Move &nbsp; Space: Jump (release all)<br>
        <div id="message"></div>
        <button id="next-stage">Next Stage</button>
        <div
          id="next-stage-hint"
          style="visibility: hidden; font-size: 11px; opacity: 0.5; margin-top: 4px"
        >
          or press Enter
        </div>
      </div>
    </div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
